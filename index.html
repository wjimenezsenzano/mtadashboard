<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NYC Subway Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
    }

    #map {
      width: 900px;
      height: 600px;
      border: 1px solid #ccc;
    }
    #charts{
      display: flex;
      gap: 40px;
      margin-top: 40px;
    }

    #adaChart, #structureChart{
      width: 450px;
    }
    
  </style>
</head>
<body>

<h1>Infrastructure & Accessibility in NYC Subway Stations</h1> 

<div style="display:flex; gap:30px;">

  <div id="map"></div>

  <div id="stationInfo" style="
      width:250px;
      padding:10px;
      border:1px solid gray;
      font-family:sans-serif;
      display:none;">
  </div>

</div>

<div id="charts" style="display:flex; gap:40px; margin-top:20px;"> //puts bar charts next to each other
  <div id="adaChart"></div>
  <div id="structureChart"></div>
</div>

<script src="script.js"></script>

</body>
</html>
