<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NYC Subway Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Top row: map + info panel */
    #topRow {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    #map {
      width: 900px;
      height: 600px;
      border: 1px solid #ccc;
    }

    #stationInfo {
      width: 250px;
      padding: 10px;
      border: 1px solid gray;
      display: none;
    }

    /* Bottom row: charts */
      #charts {
    display: flex;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: nowrap;
    justify-content: flex-start;
  }

    #adaChart, #structureChart {
  width: 400px;
  flex: 0 0 auto; 
  }
  
  </style>
</head>

<body>

<h1>Infrastructure & Accessibility in NYC Subway Stations</h1>

<!-- Top map and info panel -->
<div id="topRow">
  <div id="map"></div>
  <div id="stationInfo"></div>
</div>

<!-- Bottom charts in a container -->
<div style="width:900px;">
  <div id="charts">
    <div id="adaChart"></div>
    <div id="structureChart"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
